# ──────────────────────────────────────────────────────────────
# 카테고리 목록 (channel category list)
#
# 채널의 name + description(+ 가능하면 최근 영상 제목)에 아래 키워드를
# 매칭해 채널의 "카테고리"(대분류)와 "상세"(소분류)를 결정론적으로 판정한다.
# LLM이 아니라 키워드 매칭이라 같은 입력이면 항상 같은 결과, 비용 0.
#
# ── 갱신 방법 ──────────────────────────────────────────────────
#  1. categories 아래에서 알맞은 "카테고리 > 상세"를 찾아 keywords의
#     core(핵심·가중치 높음) 또는 general(일반·가중치 보통)에 단어를 추가한다.
#  2. 한국어 키워드는 부분 문자열로 매칭된다("알고리즘" → "알고리즘마스터" 매칭).
#     영어/숫자 키워드는 오탐을 막기 위해 단어 경계로 매칭된다("ai"는 "email"에 매칭 안 됨).
#  3. "채널/구독/영상" 같은 범용어는 stopwords에 넣어 매칭에서 제외한다.
#  4. 키워드를 의미 있게 바꿨으면 반드시 맨 위 version 을 +1 한다.
#     → 분석 캐시 키에 version이 포함돼 있어, 올리면 기존 분류 결과가 자동 무효화된다.
#  코드 수정 없이 이 파일만 고치면 다음 분석부터 바로 반영된다.
# ──────────────────────────────────────────────────────────────

version: 1

# 매칭 가중치. core = 그 상세를 강하게 특정하는 단어, general = 보조 단어.
weights:
  core: 3
  general: 1

# category 벡터에 남길 상위 카테고리 개수 (0점 카테고리는 자동 제외).
top_n: 3

# 범용어 — 어느 카테고리 키워드로도 쓰지 않으며, 키워드에 들어가도 매칭에서 제외된다.
